<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keputusan Keseluruhan Rumah Sukan - SMKTD2</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        .refresh-tag { font-size: 12px; color: #27ae60; margin-bottom: 20px; display: block; }
        
        .ranking-list { margin-top: 30px; }
        .rank-item { display: flex; align-items: center; justify-content: center; padding: 20px; margin-bottom: 15px; border-radius: 10px; color: white; font-weight: bold; font-size: 22px; transition: 0.3s; border: 2px solid transparent; }
        
        /* Warna Rumah Sukan SMKTD2 */
        .house-merak { background: #e74c3c !important; color: white !important; }
        .house-belatuk { background: #3498db !important; color: white !important; }
        .house-kenyalang { background: #f1c40f !important; color: #2c3e50 !important; }
        .house-helang { background: #27ae60 !important; color: white !important; }
        .house-jentayu { background: #e67e22 !important; color: white !important; }

        /* Butang */
        .action-buttons { margin-top: 30px; display: flex; gap: 10px; justify-content: center; }
        .btn { padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; cursor: pointer; border: none; font-size: 16px; }
        .btn-back { background: #34495e; color: white; }
        .btn-print { background: #2980b9; color: white; }
        .btn-print:hover { background: #1f6391; }

        #loading { padding: 50px; font-weight: bold; color: #7f8c8d; }

        /* FORMAT CETAK (PRINT) */
        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; max-width: 100%; width: 100%; padding: 0; }
            .action-buttons, .refresh-tag, .btn-back { display: none !important; }
            .rank-item { border: 1px solid #ccc; color: black !important; background: white !important; margin-bottom: 10px; }
            h1 { font-size: 24pt; }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="lencana.jpg" alt="Lencana" style="width: 80px;">
    <h1>KEDUDUKAN RUMAH SUKAN</h1>
    <p style="margin: 0;">KEJOHANAN OLAHRAGA SMKTD2 2026</p>
    <span class="refresh-tag">● Live Update + Markah Tambahan</span>

    <div id="loading">Memuat turun & mengira markah...</div>
    <div id="rankingList" class="ranking-list"></div>

    <div class="action-buttons">
        <a href="index.html" class="btn btn-back">Kembali ke Dashboard</a>
        <button onclick="window.print()" class="btn btn-print">🖨️ Cetak Keputusan (Untuk Emcee)</button>
    </div>
</div>

<script>
    // 1. DATA GOOGLE SHEET
    const sheetID = '1S53rBZn5NUMks5xnQLbPryseCUGuKE_YVecNKRWQy3Y';
    const gid = '62180236';
    const csvURL = `https://docs.google.com/spreadsheets/d/${sheetID}/export?format=csv&gid=${gid}`;

    // 2. TETAPAN LAJUR (G = 6, I = 8)
    const LAJUR_NAMA_RUMAH = 6;
    const LAJUR_MARKAH = 8;

    // 3. BAHAGIAN MARKAH TAMBAHAN (Cikgu-cikgu lain boleh edit di sini)
    // Masukkan markah terkumpul bagi setiap kategori di bawah:
    const MARKAH_TAMBAHAN = {
        "BELATUK": 50,    // Contoh: Markah Sukantara + Khemah
        "KENYALANG": 40, 
        "HELANG": 35, 
        "MERAK": 60, 
        "JENTAYU": 45
    };

    const SENARAI_RUMAH_SAH = ["BELATUK", "KENYALANG", "HELANG", "MERAK", "JENTAYU"];

    async function fetchScores() {
        try {
            const response = await fetch(csvURL);
            const data = await response.text();
            const rows = data.split(/\r?\n/);
            
            // Masukkan markah tambahan sebagai markah permulaan (Base Score)
            let rekodTerkumpul = {
                "BELATUK": MARKAH_TAMBAHAN["BELATUK"] || 0,
                "KENYALANG": MARKAH_TAMBAHAN["KENYALANG"] || 0,
                "HELANG": MARKAH_TAMBAHAN["HELANG"] || 0,
                "MERAK": MARKAH_TAMBAHAN["MERAK"] || 0,
                "JENTAYU": MARKAH_TAMBAHAN["JENTAYU"] || 0
            };

            for (let i = 1; i < rows.length; i++) {
                let row = rows[i].trim();
                if (row === "") continue;
                let cols = row.split(',');
                
                if (cols.length > Math.max(LAJUR_NAMA_RUMAH, LAJUR_MARKAH)) {
                    let namaRumahMentah = cols[LAJUR_NAMA_RUMAH] ? cols[LAJUR_NAMA_RUMAH].replace(/["']/g, '').trim().toUpperCase() : "";
                    let mata = cols[LAJUR_MARKAH] ? parseInt(cols[LAJUR_MARKAH].replace(/["']/g, '').trim()) : 0;
                    
                    let rumahSah = SENARAI_RUMAH_SAH.find(rumah => namaRumahMentah.includes(rumah));
                    if (rumahSah && !isNaN(mata)) {
                        rekodTerkumpul[rumahSah] += mata;
                    }
                }
            }

            let results = [];
            for (let rumah in rekodTerkumpul) {
                results.push({ nama: rumah, mata: rekodTerkumpul[rumah] });
            }

            results.sort((a, b) => b.mata - a.mata);
            displayRanking(results);

        } catch (error) {
            document.getElementById('loading').innerText = "❌ Ralat data.";
            console.error(error);
        }
    }

    function displayRanking(data) {
        const list = document.getElementById('rankingList');
        document.getElementById('loading').style.display = 'none';
        list.innerHTML = '';

        data.forEach((item, index) => {
            let houseClass = "";
            let medal = "";
            let tempatLabel = "";
            
            if(item.nama === "MERAK") houseClass = "house-merak";
            else if(item.nama === "BELATUK") houseClass = "house-belatuk";
            else if(item.nama === "KENYALANG") houseClass = "house-kenyalang";
            else if(item.nama === "HELANG") houseClass = "house-helang";
            else if(item.nama === "JENTAYU") houseClass = "house-jentayu";

            if(index === 0) { tempatLabel = "TEMPAT PERTAMA"; medal = "🥇"; }
            else if(index === 1) { tempatLabel = "TEMPAT KEDUA"; medal = "🥈"; }
            else if(index === 2) { tempatLabel = "TEMPAT KETIGA"; medal = "🥉"; }
            else { tempatLabel = `TEMPAT KE-${index + 1}`; medal = "🎖️"; }

            list.innerHTML += `
                <div class="rank-item ${houseClass}">
                    ${tempatLabel} &nbsp;|&nbsp; ${item.nama} &nbsp;|&nbsp; JUMLAH: ${item.mata} ${medal}
                </div>
            `;
        });
    }

    fetchScores();
    setInterval(fetchScores, 20000); 
</script>

</body>
</html>
