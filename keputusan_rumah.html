<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keputusan Keseluruhan Rumah Sukan - SMKTD2</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; text-align: center; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        .refresh-tag { font-size: 12px; color: #27ae60; margin-bottom: 20px; display: block; }
        
        .ranking-list { margin-top: 30px; }
        .rank-item { display: flex; align-items: center; padding: 20px; margin-bottom: 15px; border-radius: 10px; color: white; font-weight: bold; font-size: 20px; transition: 0.3s; }
        
        /* Warna Rumah */
        .house-syahbandar { background: #e74c3c; } /* Merah */
        .house-laksamana { background: #3498db; } /* Biru */
        .house-temenggung { background: #f1c40f; color: #2c3e50; } /* Kuning */
        .house-bendahara { background: #27ae60; } /* Hijau */

        .rank-number { font-size: 30px; margin-right: 20px; min-width: 40px; }
        .house-info { flex-grow: 1; text-align: left; }
        .house-score { font-size: 28px; }
        
        .medal { font-size: 24px; margin-left: 10px; }
        
        .btn-back { display: inline-block; margin-top: 30px; padding: 10px 20px; background: #34495e; color: white; text-decoration: none; border-radius: 5px; }
        
        #loading { padding: 50px; font-weight: bold; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <img src="lencana.jpg" alt="Lencana" style="width: 80px;">
    <h1>KEDUDUKAN RUMAH SUKAN</h1>
    <p style="margin: 0;">KEJOHANAN OLAHRAGA SMKTD2 2026</p>
    <span class="refresh-tag">● Live Update</span>

    <div id="loading">Memuat turun markah terkini...</div>
    <div id="rankingList" class="ranking-list"></div>

    <a href="dashboard.html" class="btn-back">Kembali ke Dashboard</a>
</div>

<script>
    // URL CSV dari sheet "markah" anda
    const sheetID = '1S53rBZn5NUMks5xnQLbPryseCUGuKE_YVecNKRWQy3Y';
    const sheetName = 'markah';
    const csvURL = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:csv&sheet=${sheetName}`;

    async function fetchScores() {
        try {
            const response = await fetch(csvURL);
            const data = await response.text();
            
            // Tukar CSV ke Array
            const rows = data.split('\n').slice(1); // Buang header
            let results = rows.map(row => {
                const cols = row.split(',');
                return {
                    nama: cols[0].replace(/"/g, '').toUpperCase(),
                    mata: parseInt(cols[1].replace(/"/g, '')) || 0
                };
            });

            // SORT: Markah tertinggi di atas
            results.sort((a, b) => b.mata - a.mata);

            displayRanking(results);
        } catch (error) {
            document.getElementById('loading').innerText = "❌ Gagal memuat data. Pastikan Google Sheet dikongsi 'Anyone with the link'.";
        }
    }

    function displayRanking(data) {
        const list = document.getElementById('rankingList');
        document.getElementById('loading').style.display = 'none';
        list.innerHTML = '';

        data.forEach((item, index) => {
            let houseClass = "";
            let medal = "";
            
            // Set warna ikut nama rumah
            if(item.nama.includes("SYAHBANDAR")) houseClass = "house-syahbandar";
            else if(item.nama.includes("LAKSAMANA")) houseClass = "house-laksamana";
            else if(item.nama.includes("TEMENGGUNG")) houseClass = "house-temenggung";
            else if(item.nama.includes("BENDAHARA")) houseClass = "house-bendahara";

            // Set medal untuk Top 3
            if(index === 0) medal = "🥇";
            else if(index === 1) medal = "🥈";
            else if(index === 2) medal = "🥉";

            list.innerHTML += `
                <div class="rank-item ${houseClass}">
                    <div class="rank-number">${index + 1}</div>
                    <div class="house-info">
                        ${item.nama} ${medal}
                    </div>
                    <div class="house-score">${item.mata}</div>
                </div>
            `;
        });
    }

    // Panggil fungsi sewaktu buka halaman
    fetchScores();
    
    // Auto refresh setiap 1 minit
    setInterval(fetchScores, 60000);
</script>

</body>
</html>
