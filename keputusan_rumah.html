<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keputusan Keseluruhan Rumah Sukan - SMKTD2</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        .refresh-tag { font-size: 12px; color: #27ae60; margin-bottom: 20px; display: block; }
        
        .ranking-list { margin-top: 30px; }
        .rank-item { display: flex; align-items: center; justify-content: center; padding: 20px; margin-bottom: 15px; border-radius: 10px; color: white; font-weight: bold; font-size: 22px; transition: 0.3s; }
        
        /* Warna Rumah Sukan SMKTD2 Mengikut Tetapan Cikgu */
        .house-merak { background: #e74c3c; } /* Merah */
        .house-belatuk { background: #3498db; } /* Biru */
        .house-kenyalang { background: #f1c40f; color: #2c3e50; } /* Kuning */
        .house-helang { background: #27ae60; } /* Hijau */
        .house-jentayu { background: #e67e22; } /* Jingga */

        .medal { font-size: 28px; margin-left: 15px; }
        .btn-back { display: inline-block; margin-top: 30px; padding: 10px 20px; background: #34495e; color: white; text-decoration: none; border-radius: 5px; }
        #loading { padding: 50px; font-weight: bold; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <img src="lencana.jpg" alt="Lencana" style="width: 80px;">
    <h1>KEDUDUKAN RUMAH SUKAN</h1>
    <p style="margin: 0;">KEJOHANAN OLAHRAGA SMKTD2 2026</p>
    <span class="refresh-tag">● Live Update Markah Terkumpul</span>

    <div id="loading">Memuat turun & mengira markah terkini...</div>
    <div id="rankingList" class="ranking-list"></div>

    <a href="index.html" class="btn-back">Kembali ke Dashboard</a>
</div>

<script>
    const sheetID = '1S53rBZn5NUMks5xnQLbPryseCUGuKE_YVecNKRWQy3Y';
    const gid = '62180236';
    const csvURL = `https://docs.google.com/spreadsheets/d/${sheetID}/export?format=csv&gid=${gid}`;

    // Tetapan Lajur
    const LAJUR_NAMA_RUMAH = 6; // Lajur G
    const LAJUR_MARKAH = 8;     // Lajur I

    // Senarai rasmi rumah sukan. Sebarang nama lain (seperti Mohd Bukhari) akan ditendang keluar.
    const SENARAI_RUMAH_SAH = ["BELATUK", "KENYALANG", "HELANG", "MERAK", "JENTAYU"];

    async function fetchScores() {
        try {
            const response = await fetch(csvURL);
            const data = await response.text();
            const rows = data.split(/\r?\n/);
            
            // Sediakan markah 0 untuk semua rumah sukan supaya 5 rumah sentiasa wujud walaupun tiada markah lagi
            let rekodTerkumpul = {
                "BELATUK": 0,
                "KENYALANG": 0,
                "HELANG": 0,
                "MERAK": 0,
                "JENTAYU": 0
            };

            for (let i = 1; i < rows.length; i++) {
                let row = rows[i].trim();
                if (row === "") continue;

                let cols = row.split(',');
                
                if (cols.length > Math.max(LAJUR_NAMA_RUMAH, LAJUR_MARKAH)) {
                    let namaRumahMentah = cols[LAJUR_NAMA_RUMAH] ? cols[LAJUR_NAMA_RUMAH].replace(/["']/g, '').trim().toUpperCase() : "";
                    let mata = cols[LAJUR_MARKAH] ? parseInt(cols[LAJUR_MARKAH].replace(/["']/g, '').trim()) : 0;
                    
                    // Semak jika nama dalam lajur G bertepatan dengan 5 rumah rasmi kita
                    let rumahSah = SENARAI_RUMAH_SAH.find(rumah => namaRumahMentah.includes(rumah));

                    if (rumahSah && !isNaN(mata)) {
                        rekodTerkumpul[rumahSah] += mata;
                    }
                }
            }

            // Tukar ke format Array untuk proses susunan (sorting)
            let results = [];
            for (let rumah in rekodTerkumpul) {
                results.push({ nama: rumah, mata: rekodTerkumpul[rumah] });
            }

            // Susun: Markah tertinggi di kedudukan nombor 1
            results.sort((a, b) => b.mata - a.mata);
            displayRanking(results);

        } catch (error) {
            document.getElementById('loading').innerText = "❌ Gagal memuat data. Pastikan Google Sheet dikongsi 'Anyone with the link'.";
            console.error("Ralat Fetching:", error);
        }
    }

    function displayRanking(data) {
        const list = document.getElementById('rankingList');
        document.getElementById('loading').style.display = 'none';
        list.innerHTML = '';

        // Tunjuk 5 yang teratas sahaja (memang ada 5 pun)
        data.slice(0, 5).forEach((item, index) => {
            let houseClass = "";
            let medal = "";
            let tempatLabel = "";
            
            // Padankan nama dengan warna CSS
            if(item.nama === "MERAK") houseClass = "house-merak";
            else if(item.nama === "BELATUK") houseClass = "house-belatuk";
            else if(item.nama === "KENYALANG") houseClass = "house-kenyalang";
            else if(item.nama === "HELANG") houseClass = "house-helang";
            else if(item.nama === "JENTAYU") houseClass = "house-jentayu";

            // Tetapkan Label
            if(index === 0) { tempatLabel = "Tempat Pertama"; medal = "🥇"; }
            else if(index === 1) { tempatLabel = "Tempat Kedua"; medal = "🥈"; }
            else if(index === 2) { tempatLabel = "Tempat Ketiga"; medal = "🥉"; }
            else { tempatLabel = `Tempat Ke-${index + 1}`; medal = "🎖️"; }

            list.innerHTML += `
                <div class="rank-item ${houseClass}">
                    ${tempatLabel} &nbsp;|&nbsp; ${item.nama} &nbsp;|&nbsp; Markah ${item.mata} ${medal}
                </div>
            `;
        });
    }

    fetchScores();
    setInterval(fetchScores, 15000); 
</script>

</body>
</html>
