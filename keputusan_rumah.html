<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keputusan Keseluruhan Rumah Sukan - SMKTD2</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .admin-panel { background: #fdf2e9; padding: 15px; border-radius: 10px; margin-bottom: 25px; border: 2px dashed #e67e22; }
        .ranking-list { margin-top: 20px; }
        .rank-item { display: flex; align-items: center; justify-content: center; padding: 18px; margin-bottom: 12px; border-radius: 10px; color: white; font-weight: bold; font-size: 20px; }
        
        /* Warna Rumah */
        .house-merak { background: #e74c3c !important; }
        .house-belatuk { background: #3498db !important; }
        .house-kenyalang { background: #f1c40f !important; color: #2c3e50 !important; }
        .house-helang { background: #27ae60 !important; }
        .house-jentayu { background: #e67e22 !important; }

        .btn { padding: 10px 15px; border-radius: 5px; cursor: pointer; border: none; font-weight: bold; }
        .btn-save { background: #27ae60; color: white; }
        .btn-print { background: #2980b9; color: white; margin-top: 20px; }
        
        input, select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; margin: 5px; }

        @media print { .admin-panel, .btn-print, .btn-back { display: none; } }
    </style>
</head>
<body>

<div class="container">
    <h1>KEDUDUKAN RUMAH SUKAN</h1>
    <p>KEJOHANAN OLAHRAGA SMKTD2</p>

    <div class="admin-panel">
        <h3 style="margin-top:0">Tambah Markah Bonus (Simpan ke Sheet)</h3>
        <select id="pilihRumah">
            <option value="BELATUK">BELATUK (Biru)</option>
            <option value="KENYALANG">KENYALANG (Kuning)</option>
            <option value="HELANG">HELANG (Hijau)</option>
            <option value="MERAK">MERAK (Merah)</option>
            <option value="JENTAYU">JENTAYU (Jingga)</option>
        </select>
        <input type="number" id="inputMarkah" placeholder="Mata">
        <button class="btn btn-save" onclick="simpanKeSheet()">💾 Simpan</button>
        <p id="msg" style="font-size:12px; color:blue;"></p>
    </div>

    <div id="loading">Memuatkan markah terkini...</div>
    <div id="rankingList" class="ranking-list"></div>

    <button class="btn btn-print" onclick="window.print()">🖨️ Cetak Untuk Emcee</button>
</div>

<script>
    // 1. GANTIKAN DENGAN URL WEB APP ANDA DARI APPS SCRIPT
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwGH2gRQ4oEezXSyGHVJ62zjj-ZMbI1H1GROYRgZSWz1xMxOI8ae3ATW_PYmZCDU4IY/exec";
    
    // 2. CSV URL (Pastikan GID betul untuk tab Keputusan)
    const CSV_URL = "https://docs.google.com/spreadsheets/d/1S53rBZn5NUMks5xnQLbPryseCUGuKE_YVecNKRWQy3Y/edit?gid=62180236#gid=62180236";
    
    // 3. GID UNTUK MARKAH AKHIR (Sila semak di browser apabila klik tab Markah_Akhir)
    // Jika cikgu belum tahu GID tab baru, sistem akan guna CSV_URL di atas dulu.
    const CSV_BONUS_URL = "https://docs.google.com/spreadsheets/d/1S53rBZn5NUMks5xnQLbPryseCUGuKE_YVecNKRWQy3Y/edit?gid=1996086125#gid=1996086125";

    async function simpanKeSheet() {
        let rumah = document.getElementById("pilihRumah").value;
        let markah = document.getElementById("inputMarkah").value;
        let msg = document.getElementById("msg");

        if(!markah) return alert("Isi markah!");
        msg.innerText = "⏳ Sedang menyimpan...";

        try {
            await fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({
                    "jenis": "bonus",
                    "rumah": rumah,
                    "markah": parseInt(markah)
                })
            });
            msg.innerText = "✅ Berjaya disimpan! Kedudukan akan dikemas kini.";
            document.getElementById("inputMarkah").value = "";
            fetchScores(); // Refresh paparan
        } catch (e) {
            msg.innerText = "❌ Gagal simpan.";
        }
    }

    async function fetchScores() {
        try {
            // Ambil data dari CSV utama
            const res = await fetch(CSV_URL);
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            
            let skor = {"BELATUK":0, "KENYALANG":0, "HELANG":0, "MERAK":0, "JENTAYU":0};

            rows.forEach(row => {
                let cols = row.split(',');
                if(cols.length > 8) {
                    let r = cols[6] ? cols[6].toUpperCase().trim() : "";
                    let m = parseInt(cols[8]) || 0;
                    for(let k in skor) { if(r.includes(k)) skor[k] += m; }
                }
            });

            // Ambil markah bonus (Jika GID Markah_Akhir sudah dimasukkan)
            try {
                const resB = await fetch(1996086125);
                const textB = await resB.text();
                textB.split('\n').slice(1).forEach(row => {
                    let c = row.split(',');
                    let r = c[0] ? c[0].toUpperCase().trim() : "";
                    let m = parseInt(c[1]) || 0;
                    if(skor[r] !== undefined) skor[r] += m;
                });
            } catch(e) {}

            let results = Object.keys(skor).map(k => ({nama: k, mata: skor[k]}));
            results.sort((a,b) => b.mata - a.mata);
            display(results);
        } catch(e) { console.log(e); }
    }

    function display(data) {
        document.getElementById('loading').style.display='none';
        let html = "";
        data.forEach((item, i) => {
            let cls = `house-${item.nama.toLowerCase()}`;
            html += `<div class="rank-item ${cls}">#${i+1} | ${item.nama} | ${item.mata} Mata</div>`;
        });
        document.getElementById('rankingList').innerHTML = html;
    }

    fetchScores();
    setInterval(fetchScores, 30000); // Auto-refresh 30 saat
</script>
</body>
</html>
