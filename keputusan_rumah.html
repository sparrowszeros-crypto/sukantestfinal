<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keputusan Keseluruhan Rumah Sukan - SMKTD2</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        .refresh-tag { font-size: 12px; color: #27ae60; margin-bottom: 20px; display: block; }
        
        .ranking-list { margin-top: 30px; }
        .rank-item { display: flex; align-items: center; justify-content: center; padding: 20px; margin-bottom: 15px; border-radius: 10px; color: white; font-weight: bold; font-size: 22px; transition: 0.3s; }
        
        /* Warna Rumah Sukan SMKTD2 */
        .house-helang { background: #e74c3c; } /* Merah */
        .house-merak { background: #3498db; } /* Biru */
        .house-jentayu { background: #f1c40f; color: #2c3e50; } /* Kuning */
        .house-belatuk { background: #27ae60; } /* Hijau */
        .house-kenyalang { background: #e67e22; } /* Oren */
        .house-default { background: #34495e; } /* Kelabu gelap jika tiada padanan */

        .medal { font-size: 28px; margin-left: 15px; }
        .btn-back { display: inline-block; margin-top: 30px; padding: 10px 20px; background: #34495e; color: white; text-decoration: none; border-radius: 5px; }
        #loading { padding: 50px; font-weight: bold; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <img src="lencana.jpg" alt="Lencana" style="width: 80px;">
    <h1>KEDUDUKAN RUMAH SUKAN</h1>
    <p style="margin: 0;">KEJOHANAN OLAHRAGA SMKTD2 2026</p>
    <span class="refresh-tag">● Live Update Markah Terkumpul</span>

    <div id="loading">Memuat turun & mengira markah terkini...</div>
    <div id="rankingList" class="ranking-list"></div>

    <a href="index.html" class="btn-back">Kembali ke Dashboard</a>
</div>

<script>
    // URL CSV menggunakan GID
    const sheetID = '1S53rBZn5NUMks5xnQLbPryseCUGuKE_YVecNKRWQy3Y';
    const gid = '62180236';
    const csvURL = `https://docs.google.com/spreadsheets/d/${sheetID}/export?format=csv&gid=${gid}`;

    // ---------------------------------------------------------
    // TETAPAN LAJUR (COLUMN) GOOGLE SHEET
    // Lajur A = 0, B = 1, C = 2, D = 3, E = 4, F = 5, G = 6, H = 7, I = 8
    // ---------------------------------------------------------
    const LAJUR_NAMA_RUMAH = 6; // Mengambil data dari Lajur G (RUMAH SUKAN)
    const LAJUR_MARKAH = 8;     // Mengambil data dari Lajur I (MATA)

    async function fetchScores() {
        try {
            const response = await fetch(csvURL);
            const data = await response.text();
            
            // Baca data sebaris demi sebaris
            // Guna split regex ini untuk abaikan koma yang mungkin ada dalam "quote"
            const rows = data.split(/\r?\n/);
            
            let rekodTerkumpul = {}; // Objek untuk simpan jumlah markah

            // Mula dari baris 1 (Abaikan baris 0 kerana ia adalah header)
            for (let i = 1; i < rows.length; i++) {
                let row = rows[i].trim();
                if (row === "") continue;

                // Pisahkan lajur mengikut koma (standard CSV)
                let cols = row.split(',');
                
                if (cols.length > Math.max(LAJUR_NAMA_RUMAH, LAJUR_MARKAH)) {
                    // Buang tanda quote (") dan bersihkan ejaan
                    let namaRumah = cols[LAJUR_NAMA_RUMAH] ? cols[LAJUR_NAMA_RUMAH].replace(/["']/g, '').trim().toUpperCase() : "";
                    let mata = cols[LAJUR_MARKAH] ? parseInt(cols[LAJUR_MARKAH].replace(/["']/g, '').trim()) : 0;
                    
                    if (namaRumah !== "" && !isNaN(mata)) {
                        // FUNGSI AUTO-SUM: Campurkan markah untuk rumah yang sama
                        if (!rekodTerkumpul[namaRumah]) {
                            rekodTerkumpul[namaRumah] = 0;
                        }
                        rekodTerkumpul[namaRumah] += mata;
                    }
                }
            }

            // Tukar objek rekodTerkumpul menjadi format Array supaya boleh disusun (sort)
            let results = [];
            for (let rumah in rekodTerkumpul) {
                results.push({ nama: rumah, mata: rekodTerkumpul[rumah] });
            }

            // Susun: Markah tertinggi di atas
            results.sort((a, b) => b.mata - a.mata);
            displayRanking(results);

        } catch (error) {
            document.getElementById('loading').innerText = "❌ Gagal memuat data. Pastikan Google Sheet dikongsi 'Anyone with the link'.";
            console.error("Ralat Fetching:", error);
        }
    }

    function displayRanking(data) {
        const list = document.getElementById('rankingList');
        document.getElementById('loading').style.display = 'none';
        list.innerHTML = '';

        if (data.length === 0) {
            list.innerHTML = "<p>Tiada rekod pemenang ditemui di dalam pangkalan data.</p>";
            return;
        }

        data.forEach((item, index) => {
            let houseClass = "house-default";
            let medal = "";
            let tempatLabel = "";
            
            // Pengesanan warna ikut nama rumah yang tepat
            if(item.nama.includes("HELANG")) houseClass = "house-helang";
            else if(item.nama.includes("MERAK")) houseClass = "house-merak";
            else if(item.nama.includes("JENTAYU")) houseClass = "house-jentayu";
            else if(item.nama.includes("BELATUK")) houseClass = "house-belatuk";
            else if(item.nama.includes("KENYALANG")) houseClass = "house-kenyalang";

            // Tetapkan Label Kedudukan
            if(index === 0) { tempatLabel = "Tempat Pertama"; medal = "🥇"; }
            else if(index === 1) { tempatLabel = "Tempat Kedua"; medal = "🥈"; }
            else if(index === 2) { tempatLabel = "Tempat Ketiga"; medal = "🥉"; }
            else { tempatLabel = `Tempat Ke-${index + 1}`; medal = "🎖️"; }

            // Papar mengikut format: Tempat pertama | Belatuk | Markah 463
            list.innerHTML += `
                <div class="rank-item ${houseClass}">
                    ${tempatLabel} &nbsp;|&nbsp; ${item.nama} &nbsp;|&nbsp; Markah ${item.mata} ${medal}
                </div>
            `;
        });
    }

    // Panggil kali pertama apabila dibuka
    fetchScores();
    // Refresh secara automatik setiap 15 saat supaya lebih pantas dikemas kini
    setInterval(fetchScores, 15000); 
</script>

</body>
</html>
