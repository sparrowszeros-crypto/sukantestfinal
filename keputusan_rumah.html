<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keputusan Keseluruhan Rumah Sukan - SMKTD2</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        .refresh-tag { font-size: 12px; color: #27ae60; margin-bottom: 20px; display: block; }
        
        .ranking-list { margin-top: 30px; }
        .rank-item { display: flex; align-items: center; justify-content: center; padding: 20px; margin-bottom: 15px; border-radius: 10px; color: white; font-weight: bold; font-size: 22px; transition: 0.3s; }
        
        /* Warna Rumah Sukan (Boleh tambah/ubah ikut kesesuaian) */
        .house-merah { background: #e74c3c; } 
        .house-biru { background: #3498db; } 
        .house-kuning { background: #f1c40f; color: #2c3e50; } 
        .house-hijau { background: #27ae60; } 
        .house-default { background: #34495e; } /* Warna kelabu gelap jika sistem tak cam nama rumah */

        .medal { font-size: 28px; margin-left: 15px; }
        .btn-back { display: inline-block; margin-top: 30px; padding: 10px 20px; background: #34495e; color: white; text-decoration: none; border-radius: 5px; }
        #loading { padding: 50px; font-weight: bold; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <img src="lencana.jpg" alt="Lencana" style="width: 80px;">
    <h1>KEDUDUKAN RUMAH SUKAN</h1>
    <p style="margin: 0;">KEJOHANAN OLAHRAGA SMKTD2 2026</p>
    <span class="refresh-tag">● Live Update</span>

    <div id="loading">Memuat turun markah terkini...</div>
    <div id="rankingList" class="ranking-list"></div>

    <a href="index.html" class="btn-back">Kembali ke Dashboard</a>
</div>

<script>
    // URL CSV menggunakan GID
    const sheetID = '1S53rBZn5NUMks5xnQLbPryseCUGuKE_YVecNKRWQy3Y';
    const gid = '62180236';
    const csvURL = `https://docs.google.com/spreadsheets/d/${sheetID}/export?format=csv&gid=${gid}`;

    // ---------------------------------------------------------
    // TETAPAN LAJUR (COLUMN) GOOGLE SHEET
    // 0 = Lajur A, 1 = Lajur B, 2 = Lajur C, 3 = Lajur D
    // Ubah nombor di bawah ikut kedudukan sebenar di Sheet anda
    // ---------------------------------------------------------
    const LAJUR_NAMA_RUMAH = 1; // Contoh: 1 bermaksud Lajur B
    const LAJUR_MARKAH = 2;     // Contoh: 2 bermaksud Lajur C

    async function fetchScores() {
        try {
            const response = await fetch(csvURL);
            const data = await response.text();
            
            const rows = data.split('\n');
            let results = [];

            // Mula dari baris 1 untuk abaikan tajuk (Header)
            for (let i = 1; i < rows.length; i++) {
                let row = rows[i].trim();
                if (row === "") continue;

                // Pisahkan data menggunakan koma
                let cols = row.split(',');
                
                // Pastikan lajur wujud sebelum proses
                if (cols.length > Math.max(LAJUR_NAMA_RUMAH, LAJUR_MARKAH)) {
                    let namaRumah = cols[LAJUR_NAMA_RUMAH] ? cols[LAJUR_NAMA_RUMAH].replace(/["']/g, '').trim().toUpperCase() : "";
                    let mataRumah = cols[LAJUR_MARKAH] ? parseInt(cols[LAJUR_MARKAH].replace(/["']/g, '').trim()) : 0;
                    
                    if (namaRumah !== "" && !isNaN(mataRumah)) {
                        results.push({ nama: namaRumah, mata: mataRumah });
                    }
                }
            }

            // Susun: Markah tertinggi di atas
            results.sort((a, b) => b.mata - a.mata);
            displayRanking(results);

        } catch (error) {
            document.getElementById('loading').innerText = "❌ Gagal memuat data. Pastikan Google Sheet dikongsi 'Anyone with the link'.";
            console.error(error);
        }
    }

    function displayRanking(data) {
        const list = document.getElementById('rankingList');
        document.getElementById('loading').style.display = 'none';
        list.innerHTML = '';

        if (data.length === 0) {
            list.innerHTML = "<p>Tiada data dijumpai dalam rekod. Sila semak tetapan Lajur (Column).</p>";
            return;
        }

        data.forEach((item, index) => {
            let houseClass = "house-default"; // Default color
            let medal = "";
            let tempatLabel = "";
            
            // Kenal pasti warna berdasarkan nama rumah (Boleh ubah/tambah nama di sini)
            if(item.nama.includes("SYAHBANDAR") || item.nama.includes("MERAH") || item.nama.includes("RAJAWALI") || item.nama.includes("MARIKH")) houseClass = "house-merah";
            else if(item.nama.includes("LAKSAMANA") || item.nama.includes("BIRU") || item.nama.includes("TIUNG") || item.nama.includes("NEPTUN")) houseClass = "house-biru";
            else if(item.nama.includes("TEMENGGUNG") || item.nama.includes("KUNING") || item.nama.includes("BELATUK") || item.nama.includes("ZUHAL")) houseClass = "house-kuning";
            else if(item.nama.includes("BENDAHARA") || item.nama.includes("HIJAU") || item.nama.includes("SERINDIT") || item.nama.includes("BUMI")) houseClass = "house-hijau";

            // Set Label Tempat & Medal
            if(index === 0) { tempatLabel = "Tempat Pertama"; medal = "🥇"; }
            else if(index === 1) { tempatLabel = "Tempat Kedua"; medal = "🥈"; }
            else if(index === 2) { tempatLabel = "Tempat Ketiga"; medal = "🥉"; }
            else { tempatLabel = `Tempat Ke-${index + 1}`; }

            // Output format: Tempat pertama | Belatuk | Markah 463
            list.innerHTML += `
                <div class="rank-item ${houseClass}">
                    ${tempatLabel} &nbsp;|&nbsp; ${item.nama} &nbsp;|&nbsp; Markah ${item.mata} ${medal}
                </div>
            `;
        });
    }

    fetchScores();
    setInterval(fetchScores, 60000); // Refresh setiap 60 saat
</script>

</body>
</html>
