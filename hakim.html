<style>
    .btn-jana { background: #e67e22; color: white; margin-bottom: 10px; width: 100%; }
    .lorong-col { font-weight: bold; color: #d35400; text-align: center; }
</style>

<table>
    <thead>
        <tr>
            <th width="5%">No</th>
            <th width="10%">Lorong</th>
            <th width="12%">No Badan</th>
            <th>Nama Murid</th>
            <th width="10%">Kelas</th>
            <th class="print-col" width="15%">Masa/Jarak</th>
            <th class="print-col" width="10%">Kedudukan</th>
        </tr>
    </thead>
    <tbody id="atletRows"></tbody>
</table>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwEBmbvGDCalb1iY-w4uWXs1zcw5ucgWB5OsadCVxK-JgAGWGl0HFOOQz5B18zPrDiq/exec';
    let dataAtlet = [];
    let dataLorong = [];

    function fetchAtlet() {
        fetch(scriptURL).then(res => res.json()).then(res => {
            dataAtlet = res.atlet; // Dari tab Pendaftaran
            dataLorong = res.lorong; // Dari tab Acara
            document.getElementById('status').innerText = 'Data Sedia.';
        });
    }

    function generateBorang(namaAcara) {
        document.getElementById('eventTitle').innerText = namaAcara.toUpperCase();
        
        // 1. Tapis atlet dari pendaftaran
        let senarai = [];
        for(let i=1; i<dataAtlet.length; i++) {
            if(dataAtlet[i][4].includes(namaAcara) || dataAtlet[i][5].includes(namaAcara)) {
                senarai.push({ noBadan: dataAtlet[i][0], nama: dataAtlet[i][1], kelas: dataAtlet[i][3] });
            }
        }

        // 2. Semak jika lorong sudah ada dalam database
        let lorongSudahAda = dataLorong.filter(r => r[2] == namaAcara);
        
        if (lorongSudahAda.length === 0 && senarai.length > 0) {
            // Jika belum ada, acak lorong (1-8)
            let lorongTersedia = [1,2,3,4,5,6,7,8];
            senarai = senarai.map(a => {
                let indexRawak = Math.floor(Math.random() * lorongTersedia.length);
                return { ...a, lorong: lorongTersedia.splice(indexRawak, 1)[0] || '-' };
            });
            // Simpan ke Google Sheet supaya kekal
            simpanLorongKeDatabase(namaAcara, senarai);
        } else {
            // Jika sudah ada, gunakan data dari tab Acara
            senarai = lorongSudahAda.map(l => ({ noBadan: l[0], nama: l[1], kelas: '-', lorong: l[3] }));
        }

        paparkan(senarai);
    }

    function simpanLorongKeDatabase(namaAcara, senarai) {
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ action: "JANA_LORONG", namaAcara: namaAcara, senarai: senarai })
        }).then(() => console.log("Lorong disimpan"));
    }

    function paparkan(senarai) {
        const tbody = document.getElementById('atletRows');
        tbody.innerHTML = '';
        senarai.sort((a,b) => a.lorong - b.lorong).forEach((m, i) => {
            tbody.innerHTML += `
                <tr>
                    <td>${i + 1}</td>
                    <td class="lorong-col">${m.lorong}</td>
                    <td>${m.noBadan}</td>
                    <td>${m.nama}</td>
                    <td>${m.kelas}</td>
                    <td class="print-col"></td>
                    <td class="print-col"></td>
                </tr>`;
        });
    }
    window.onload = fetchAtlet;
</script>
