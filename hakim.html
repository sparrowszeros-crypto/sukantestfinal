<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Borang Hakim - SMKTD2</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f0f2f5; }
        .container { max-width: 950px; margin: auto; background: white; padding: 30px; border: 1px solid #333; }
        .no-print { background: #fff; padding: 20px; border-bottom: 2px solid #ccc; margin-bottom: 20px; text-align: center; }
        .btn-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin: 15px 0; }
        button { padding: 10px; cursor: pointer; font-weight: bold; border-radius: 4px; border: none; }
        .btn-event { background: #3498db; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; table-layout: fixed; }
        th, td { border: 1px solid #000 !important; padding: 8px; text-align: left; word-wrap: break-word; }
        th { background: #eee; }
        .cat-header { background: #2c3e50 !important; color: white !important; font-weight: bold; padding: 10px; }
        .team-names { font-size: 11px; color: #444; margin-top: 4px; display: block; }
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .container { border: none; max-width: 100%; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <h2>PANEL HAKIM PENCATAT SMKTD2</h2>
    <div class="btn-grid" id="eventButtons"></div>
    <p id="status">Memuat data...</p>
</div>

<div class="container">
    <div style="text-align:center;">
        <img src="lencana.jpg" alt="Lencana" style="max-width:80px;">
        <h2 style="margin:5px 0;">BORANG PENCATAT KEPUTUSAN</h2>
        <h3 style="margin:5px 0;">ACARA: <span id="eventTitle">..........</span></h3>
    </div>

    <table>
        <thead>
            <tr>
                <th width="5%">No</th>
                <th width="15%">Saringan/Lorong</th>
                <th width="12%">No Badan</th>
                <th>Nama Atlet / Pasukan (Rumah)</th>
                <th width="15%">Masa/Jarak</th>
                <th width="10%">Kedudukan</th>
            </tr>
        </thead>
        <tbody id="atletRows"></tbody>
    </table>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzJU81HwJJb3N8Yi99QwQr38cvdUPXahAY_b6GfsQG8S72u3M3h44Ek1xDp4mE4KySN/exec';
    let database = [];
    const acaraList = ["70m", "100m", "400m", "4x100m", "4x400m", "Lompat Jauh", "Lontar Peluru", "Lompat Tinggi", "Tarik Tali"];

    const btnArea = document.getElementById('eventButtons');
    acaraList.forEach(a => {
        btnArea.innerHTML += `<button class="btn-event" onclick="generateBorang('${a}')">${a}</button>`;
    });

    window.onload = () => {
        fetch(scriptURL).then(res => res.json()).then(res => {
            database = res.atlet;
            document.getElementById('status').innerText = '✅ Data Sedia.';
        });
    };

    function generateBorang(acara) {
        document.getElementById('eventTitle').innerText = acara.toUpperCase();
        const tbody = document.getElementById('atletRows');
        tbody.innerHTML = '';

        let isTeamEvent = acara.includes("4x") || acara.includes("Tarik");
        let filtered = database.filter(a => (a.AcaraIndividu.includes(acara) || a.AcaraBerpasukan.includes(acara)));

        let kategoriMap = {};
        filtered.forEach(a => {
            let kat = "";
            if (acara === "4x400m") {
                kat = a.Jantina === "L" ? "LELAKI TERBUKA" : "PEREMPUAN TERBUKA";
            } else {
                let ting = a.Kelas.charAt(0);
                if (ting == "1" || ting == "2") kat = a.Jantina + "3";
                else if (ting == "3") kat = a.Jantina + "2";
                else if (ting == "4" || ting == "5") kat = a.Jantina + "1";
            }
            if (!kategoriMap[kat]) kategoriMap[kat] = isTeamEvent ? {} : [];
            
            if (isTeamEvent) {
                if (!kategoriMap[kat][a.RumahSukan]) kategoriMap[kat][a.RumahSukan] = [];
                kategoriMap[kat][a.RumahSukan].push(a.NamaMurid);
            } else {
                kategoriMap[kat].push(a);
            }
        });

        for (let kat in kategoriMap) {
            tbody.innerHTML += `<tr><td colspan="6" class="cat-header">KATEGORI: ${kat}</td></tr>`;
            let list = isTeamEvent ? Object.keys(kategoriMap[kat]) : kategoriMap[kat];

            list.forEach((item, i) => {
                let lane = (i % 8) + 1;
                let heat = Math.ceil((i + 1) / 8);
                let namaDisplay = isTeamEvent ? 
                    `<strong>${item.toUpperCase()}</strong><span class="team-names">Pelari: ${kategoriMap[kat][item].join(", ")}</span>` : 
                    `${item.NamaMurid} (${item.Kelas} - ${item.RumahSukan})`;
                
                tbody.innerHTML += `
                    <tr>
                        <td>${i + 1}</td>
                        <td style="color:red; font-weight:bold">S${heat}-L${lane}</td>
                        <td style="text-align:center">${isTeamEvent ? '-' : item.NomborBadan}</td>
                        <td>${namaDisplay}</td>
                        <td></td><td></td>
                    </tr>`;
            });
        }
    }
</script>
</body>
</html>
