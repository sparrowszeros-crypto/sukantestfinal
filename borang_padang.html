<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Borang Padang SMKTD2</title>
    <style>
        body { font-family: 'Arial', sans-serif; padding: 20px; }
        .no-print { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #dee2e6; }
        select, input, button { padding: 10px; margin-right: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #28a745; color: white; cursor: pointer; border: none; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #000; padding: 8px; text-align: center; font-size: 14px; }
        th { background: #f2f2f2; }
        .header-print { text-align: center; display: none; }
        @media print { 
            .no-print { display: none; } 
            .header-print { display: block; }
            body { padding: 0; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <h3>⚙️ Jana Borang Padang</h3>
    <select id="selKat">
        <option value="L">Lelaki (L)</option>
        <option value="P">Perempuan (P)</option>
    </select>
    <select id="selKelas">
        <option value="1">Kelas 1</option>
        <option value="2">Kelas 2</option>
    </select>
    <input type="text" id="inpAcara" placeholder="Cth: Lompat Jauh">
    <button onclick="janaBorang()">JANA SENARAI</button>
</div>

<div id="printArea">
    <div class="header-print">
        <h2>BORANG TEKNIKAL ACARA PADANG</h2>
        <h3 id="txtJudul">-</h3>
    </div>
    <table>
        <thead>
            <tr>
                <th width="30">No</th>
                <th width="80">No Badan</th>
                <th>Nama Peserta</th>
                <th width="80">Rumah</th>
                <th width="50">T1</th>
                <th width="50">T2</th>
                <th width="50">T3</th>
                <th width="60">Terbaik</th>
                <th width="40">Ked.</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="9">Sila jana borang di atas.</td></tr>
        </tbody>
    </table>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzCl7YHhTZrR9calkir3fKiml518a3TPOLAktvtwffM1nBam2oaRhK1IodfzyVV6nuO/exec';
    let databaseAtlet = [];

    window.onload = function() {
        fetch(scriptURL)
            .then(res => res.json())
            .then(result => {
                databaseAtlet = result.atlet;
            });
    };

    function janaBorang() {
        const jantina = document.getElementById('selKat').value;
        const kelas = document.getElementById('selKelas').value;
        const acara = document.getElementById('inpAcara').value;
        
        document.getElementById('txtJudul').innerText = `${acara.toUpperCase()} (${jantina}${kelas})`;

        // Tapis mengikut Jantina, Kelas, dan Acara
        const filtered = databaseAtlet.filter(a => 
            a.Jantina === jantina && 
            a.Kelas.toString() === kelas && 
            a.AcaraIndividu.includes(acara)
        );

        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        if(filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="9">Tiada atlet dijumpai untuk kriteria ini.</td></tr>';
            return;
        }

        filtered.forEach((a, index) => {
            tbody.innerHTML += `
                <tr>
                    <td>${index + 1}</td>
                    <td>${a.NomborBadan}</td>
                    <td style="text-align:left">${a.NamaMurid}</td>
                    <td>${a.RumahSukan}</td>
                    <td></td><td></td><td></td><td></td><td></td>
                </tr>
            `;
        });
    }
</script>

</body>
</html>
