<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Borang Hakim Padang</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid black; padding: 8px; text-align: center; }
        .header { text-align: center; }
        .no-print { margin-bottom: 20px; background: #eee; padding: 15px; border-radius: 10px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="no-print">
    <h3>Tapisan Acara Padang</h3>
    <select id="filterKategori">
        <option value="">Pilih Kategori</option>
        <option value="L1">Lelaki 1</option>
        <option value="P1">Perempuan 1</option>
        <option value="L2">Lelaki 2</option>
        <option value="P2">Perempuan 2</option>
    </select>
    <input type="text" id="filterAcara" placeholder="Nama Acara (cth: Lompat Jauh)">
    <button onclick="janaBorang()">JANA BORANG</button>
</div>

<div id="printArea">
    <div class="header">
        <h2>KEJOHANAN SUKAN TAHUNAN SMKTD2 2026</h2>
        <h3 id="judulAcara">-</h3>
    </div>
    <table id="jadualPadang">
        <thead>
            <tr>
                <th>No</th>
                <th>No Badan</th>
                <th>Nama Peserta</th>
                <th>Rumah</th>
                <th>T1</th>
                <th>T2</th>
                <th>T3</th>
                <th>Terbaik</th>
                <th>Ked.</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzCl7YHhTZrR9calkir3fKiml518a3TPOLAktvtwffM1nBam2oaRhK1IodfzyVV6nuO/exec';
    let dataAtlet = [];

    window.onload = function() {
        fetch(scriptURL)
            .then(res => res.json())
            .then(result => {
                dataAtlet = result.atlet; // AMBIL result.atlet
            });
    };

    function janaBorang() {
        const kat = document.getElementById('filterKategori').value;
        const aca = document.getElementById('filterAcara').value;
        document.getElementById('judulAcara').innerText = `Acara: ${aca} (${kat})`;

        const filtered = dataAtlet.filter(a => 
            a.Jantina.includes(kat.charAt(0)) && 
            a.Individu.includes(aca)
        );

        const tbody = document.querySelector('#jadualPadang tbody');
        tbody.innerHTML = '';

        filtered.forEach((a, index) => {
            tbody.innerHTML += `
                <tr>
                    <td>${index + 1}</td>
                    <td>${a.NoBadan}</td>
                    <td style="text-align:left">${a.Nama}</td>
                    <td>${a.Rumah}</td>
                    <td></td><td></td><td></td><td></td><td></td>
                </tr>
            `;
        });
    }
</script>

</body>
</html>
