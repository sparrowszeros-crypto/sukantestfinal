<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Borang Hakim Padang - SMKTD2</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 10px; background: #f4f7f6; }
        .no-print { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border: 2px solid #000; }
        
        .header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 15px; position: relative; }
        .header img { position: absolute; left: 10px; top: 0; max-width: 75px; }
        .header h2 { margin: 0; font-size: 20px; text-transform: uppercase; }

        .info-table { width: 100%; margin-bottom: 15px; border: none; }
        .info-table td { border: none; padding: 5px; font-weight: bold; font-size: 14px; }
        .box { border: 2px solid #000; padding: 4px 12px; display: inline-block; min-width: 40px; text-align: center; margin: 0 2px; }
        .highlight { background-color: #000 !important; color: #fff !important; }

        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #000; padding: 4px; text-align: center; }
        th { background: #eee; font-size: 10px; text-transform: uppercase; }
        
        .nama-peserta { text-align: left; padding-left: 5px; font-size: 11px; font-weight: bold; }
        .trial-sub-box { width: 25px; height: 35px; border: 1px solid #000; } /* Kotak cubaan kecil (Purple) */
        .height-header { height: 25px; background: #fafafa; font-weight: bold; }
        
        .footer { margin-top: 30px; display: flex; justify-content: space-between; font-weight: bold; font-size: 13px; }
        .note { font-size: 10px; margin-top: 10px; font-style: italic; }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .container { border: 2px solid #000; width: 100%; box-shadow: none; }
            th { background: #eee !important; -webkit-print-color-adjust: exact; }
        }

        select, button { padding: 10px; font-size: 14px; margin: 5px; border-radius: 6px; border: 1px solid #ccc; cursor: pointer; }
        .btn-jana { background: #27ae60; color: white; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="no-print">
    <h3>⚙️ PANEL JANA BORANG ACARA PADANG</h3>
    <p id="dataStatus" style="color: #e67e22; font-weight: bold;">⏳ Memuatkan data atlet...</p>
    
    <select id="selAcara">
        <option value="Lompat Tinggi">LOMPAT TINGGI</option>
        <option value="Lompat Jauh">LOMPAT JAUH</option>
        <option value="Lontar Peluru">LONTAR PELURU</option>
    </select>
    
    <select id="selKat">
        <option value="L1">L1</option><option value="L2">L2</option><option value="L3">L3</option>
        <option value="P1">P1</option><option value="P2">P2</option><option value="P3">P3</option>
    </select>
    
    <button class="btn-jana" onclick="janaBorang()">JANA & PAPAR</button>
    <button onclick="window.print()" style="background:#2c3e50; color:white;">CETAK BORANG</button>
</div>

<div class="container">
    <div class="header">
        <img src="lencana.jpg" alt="Logo">
        <h2>KEJOHANAN SUKAN OLAHRAGA KALI KE-16 SMKTD2</h2>
    </div>

    <table class="info-table">
        <tr>
            <td width="15%">ACARA</td>
            <td width="40%">: <span class="box" style="min-width: 150px;" id="dispAcara"></span></td>
            <td width="10%">KELAS</td>
            <td>: <span class="box" id="boxK1">1</span> <span class="box" id="boxK2">2</span> <span class="box" id="boxK3">3</span></td>
        </tr>
        <tr>
            <td>JANTINA</td>
            <td>: <span class="box" id="boxL">L</span> <span class="box" id="boxP">P</span></td>
            <td>KATEGORI</td>
            <td>: <span id="dispFullKat" style="border-bottom: 1px dashed #000; min-width: 100px; display: inline-block;"></span></td>
        </tr>
    </table>

    <table id="mainTable">
        <thead id="tableHead"></thead>
        <tbody id="atletRows"></tbody>
    </table>

    <div class="footer">
        <div><p>NAMA PENCATAT : _________________________</p></div>
        <div><p>TANDATANGAN : _______________</p></div>
    </div>
    <div id="noteArea" class="note"></div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbykIUZT51z2puBVu55njKXYjnRKoqUjmGiqZEvAHKnnI1MXYgXTxgAKvTJbQVGOD9El/exec';
    let dataSemua = [];

    window.onload = () => {
        fetch(scriptURL).then(res => res.json()).then(res => {
            dataSemua = res.atlet;
            document.getElementById('dataStatus').innerText = '✅ Data Berjaya Dimuatkan';
            setTimeout(() => { document.getElementById('dataStatus').style.display = 'none'; }, 2000);
        });
    };

    function janaBorang() {
        const acara = document.getElementById('selAcara').value;
        const kat = document.getElementById('selKat').value;
        const thead = document.getElementById('tableHead');
        const tbody = document.getElementById('atletRows');
        const noteArea = document.getElementById('noteArea');
        
        document.getElementById('dispAcara').innerText = acara.toUpperCase();
        document.getElementById('dispFullKat').innerText = kat;

        if(acara === "Lompat Tinggi") {
            // HEADER LOMPAT TINGGI DENGAN 3 CUBAAN (PURPLE BOXES)
            let headerPeringkat = "";
            let headerSubPeringkat = "";
            let rowKetinggian = "";
            
            for(let i=1; i<=8; i++) {
                headerPeringkat += `<th colspan="3">${i}</th>`;
                headerSubPeringkat += `<th width="20">1</th><th width="20">2</th><th width="20">3</th>`;
                rowKetinggian += `<td colspan="3" class="height-header"></td>`;
            }

            thead.innerHTML = `
                <tr>
                    <th rowspan="3" width="30">BIL</th>
                    <th rowspan="3">NAMA PESERTA</th>
                    <th rowspan="3" width="60">NO</th>
                    <th rowspan="3" width="60">RUMAH</th>
                    <th colspan="24">PERINGKAT KETINGGIAN PALANG (METER)</th>
                    <th rowspan="3" width="50">BEST</th>
                    <th rowspan="3" width="30">KED.</th>
                </tr>
                <tr>${headerPeringkat}</tr>
                <tr class="height-header">${rowKetinggian}</tr>`;
            
            noteArea.innerHTML = "* Tanda (O) Berjaya, (X) Gagal, (-) Pass. Tanda pada petak kecil 1, 2, 3 bagi setiap peringkat ketinggian.";
        } else {
            // HEADER BIASA (JAUH/PELURU)
            thead.innerHTML = `
                <tr>
                    <th rowspan="2" width="40">BIL</th>
                    <th rowspan="2">NAMA PESERTA</th>
                    <th rowspan="2" width="120">RUMAH</th>
                    <th colspan="3">CUBAAN / JARAK</th>
                    <th rowspan="2" width="85">TERBAIK</th>
                    <th rowspan="2" width="85">KEDUDUKAN</th>
                    <th rowspan="2" width="70">MATA</th>
                </tr>
                <tr><th width="75">1</th><th width="75">2</th><th width="75">3</th></tr>`;
            noteArea.innerHTML = "* Catatkan jarak. Tanda (X) bagi cubaan batal.";
        }

        // Highlight Boxes
        ["boxK1", "boxK2", "boxK3", "boxL", "boxP"].forEach(id => document.getElementById(id).classList.remove('highlight'));
        if(kat.includes('1')) document.getElementById('boxK1').classList.add('highlight');
        if(kat.includes('2')) document.getElementById('boxK2').classList.add('highlight');
        if(kat.includes('3')) document.getElementById('boxK3').classList.add('highlight');
        if(kat.includes('L')) document.getElementById('boxL').classList.add('highlight');
        if(kat.includes('P')) document.getElementById('boxP').classList.add('highlight');

        tbody.innerHTML = '';
        let senarai = dataSemua.filter(a => {
            let ting = a.Kelas.toString().charAt(0);
            let k = (ting == "1" || ting == "2") ? a.Jantina + "3" : (ting == "3" ? a.Jantina + "2" : a.Jantina + "1");
            return a.AcaraIndividu.includes(acara) && k == kat;
        });

        senarai.forEach((m, i) => {
            let cells = "";
            if(acara === "Lompat Tinggi") {
                for(let c=0; c<24; c++) { cells += `<td class="trial-sub-box"></td>`; } // 8 peringkat x 3 cubaan
            } else {
                for(let c=0; c<3; c++) { cells += `<td style="height:40px"></td>`; }
            }
            
            tbody.innerHTML += `
                <tr>
                    <td>${i + 1}</td>
                    <td class="nama-peserta">${m.NamaMurid.toUpperCase()}</td>
                    ${acara === "Lompat Tinggi" ? `<td>${m.NomborBadan}</td>` : ""}
                    <td>${m.RumahSukan.toUpperCase()}</td>
                    ${cells}
                    <td></td><td></td>
                    ${acara !== "Lompat Tinggi" ? "<td></td>" : ""}
                </tr>`;
        });
    }
</script>
</body>
</html>
