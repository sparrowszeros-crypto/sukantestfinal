<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Borang Padang SMKTD2</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid black; padding: 8px; text-align: center; }
        .no-print { background: #eee; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="no-print">
    <h2>⚙️ JANA BORANG PADANG</h2>
    <label>Pilih Acara Padang:</label>
    <select id="pilihAcara" onchange="janaJadual()">
        <option value="">-- Pilih Acara --</option>
    </select>
</div>

<div id="printArea">
    <h2 style="text-align:center">BORANG KEPUTUSAN ACARA PADANG</h2>
    <h3 id="txtAcara" style="text-align:center">-</h3>
    <table>
        <thead>
            <tr>
                <th>No</th>
                <th>No Badan</th>
                <th>Nama Peserta</th>
                <th>Rumah</th>
                <th>T1</th><th>T2</th><th>T3</th>
                <th>Terbaik</th><th>Ked.</th>
            </tr>
        </thead>
        <tbody id="isiJadual"></tbody>
    </table>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzCl7YHhTZrR9calkir3fKiml518a3TPOLAktvtwffM1nBam2oaRhK1IodfzyVV6nuO/exec';
    let dataAtlet = [];

    window.onload = () => {
        fetch(scriptURL)
            .then(res => res.json())
            .then(result => {
                dataAtlet = result.atlet;
                let acaraPadang = ["Lompat Jauh", "Lontar Peluru", "Lompat Tinggi", "Lontar Cakera"];
                let dropdown = document.getElementById('pilihAcara');
                
                acaraPadang.forEach(aca => {
                    ["L1", "L2", "P1", "P2"].forEach(kat => {
                        let opt = document.createElement('option');
                        opt.value = `${aca} ${kat}`;
                        opt.text = `${aca} ${kat}`;
                        dropdown.add(opt);
                    });
                });
            });
    };

    function janaJadual() {
        let filter = document.getElementById('pilihAcara').value;
        document.getElementById('txtAcara').innerText = filter;

        let [namaAcara, kategori] = filter.split(' ');
        let senarai = dataAtlet.filter(a => 
            a.AcaraIndividu.includes(namaAcara) && 
            a.Jantina === kategori.charAt(0) && 
            a.Kelas.toString() === kategori.charAt(1)
        );

        let html = "";
        senarai.forEach((a, i) => {
            html += `<tr>
                <td>${i+1}</td>
                <td>${a.NomborBadan}</td>
                <td style="text-align:left">${a.NamaMurid}</td>
                <td>${a.RumahSukan}</td>
                <td></td><td></td><td></td><td></td><td></td>
            </tr>`;
        });
        document.getElementById('isiJadual').innerHTML = html || '<tr><td colspan="9">Tiada data dijumpai</td></tr>';
    }
</script>
</body>
</html>
