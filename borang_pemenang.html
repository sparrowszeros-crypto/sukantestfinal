<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borang Pemenang SMKTD2</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .winner-row { display: grid; grid-template-columns: 1fr 2fr 1fr 1fr; gap: 10px; margin-bottom: 10px; align-items: center; }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        button:hover { background: #219150; }
        #loading { text-align: center; font-style: italic; color: #7f8c8d; }
        .emcee-box { background: #fff3cd; border: 1px solid #ffeeba; padding: 15px; margin-top: 20px; border-radius: 5px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏆 BORANG PEMENANG & SKRIP EMCEE</h2>
    <div id="loading">Memuat turun data atlet...</div>

    <div class="form-group">
        <label>Pilih Acara:</label>
        <input type="text" id="namaAcara" placeholder="Contoh: 100M L1">
    </div>

    <div id="winner-inputs">
        <div class="winner-row">
            <span>1st</span>
            <input type="text" id="p1_no" placeholder="No Badan" onchange="cariAtlet(1)">
            <input type="text" id="p1_nama" readonly placeholder="Nama">
            <input type="number" id="p1_mata" value="5">
        </div>
        <div class="winner-row">
            <span>2nd</span>
            <input type="text" id="p2_no" placeholder="No Badan" onchange="cariAtlet(2)">
            <input type="text" id="p2_nama" readonly placeholder="Nama">
            <input type="number" id="p2_mata" value="3">
        </div>
        <div class="winner-row">
            <span>3rd</span>
            <input type="text" id="p3_no" placeholder="No Badan" onchange="cariAtlet(3)">
            <input type="text" id="p3_nama" readonly placeholder="Nama">
            <input type="number" id="p3_mata" value="1">
        </div>
    </div>

    <button onclick="simpanKeputusan()">SIMPAN & JANA SKRIP</button>

    <div id="emceeBox" class="emcee-box">
        <strong>🎤 Skrip Pengumuman:</strong>
        <p id="emceeScript"></p>
        <button onclick="window.print()" style="background: #34495e;">CETAK SKRIP</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzCl7YHhTZrR9calkir3fKiml518a3TPOLAktvtwffM1nBam2oaRhK1IodfzyVV6nuO/exec';
    let databaseAtlet = [];

    window.onload = function() {
        fetch(scriptURL)
            .then(res => res.json())
            .then(result => {
                databaseAtlet = result.atlet; // AMBIL DARI result.atlet
                document.getElementById('loading').style.display = 'none';
            });
    };

    function cariAtlet(n) {
        const no = document.getElementById(`p${n}_no`).value;
        const atlet = databaseAtlet.find(a => a.NoBadan.toString() === no.toString());
        if(atlet) {
            document.getElementById(`p${n}_nama`).value = atlet.Nama + " (" + atlet.Rumah + ")";
        } else {
            alert("No Badan tidak dijumpai!");
        }
    }

    function simpanKeputusan() {
        const acara = document.getElementById('namaAcara').value;
        const pemenang = [];
        
        for(let i=1; i<=3; i++) {
            const no = document.getElementById(`p${i}_no`).value;
            const namaFull = document.getElementById(`p${i}_nama`).value;
            if(no) {
                pemenang.push({
                    kedudukan: i,
                    noBadan: no,
                    nama: namaFull.split(' (')[0],
                    rumah: namaFull.split('(')[1].replace(')', ''),
                    mata: document.getElementById(`p${i}_mata`).value
                });
            }
        }

        if(!acara) return alert("Sila isi nama acara!");

        fetch(scriptURL, {
            method: 'POST',
            body: JSON.stringify({ action: 'SIMPAN_MARKAH', acara: acara, pemenang: pemenang })
        })
        .then(() => {
            alert("Data berjaya disimpan ke Google Sheets!");
            janaSkrip(acara, pemenang);
        });
    }

    function janaSkrip(acara, pemenang) {
        let text = `Diumumkan keputusan bagi acara ${acara}. <br><br>`;
        pemenang.reverse().forEach(p => {
            text += `Tempat ke-${p.kedudukan} dimenangi oleh ${p.nama} dari rumah ${p.rumah}. <br>`;
        });
        document.getElementById('emceeScript').innerHTML = text;
        document.getElementById('emceeBox').style.display = 'block';
    }
</script>

</body>
</html>
