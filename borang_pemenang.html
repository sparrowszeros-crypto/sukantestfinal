<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Borang Pemenang SMKTD2</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f7f6; }
        .box { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 15px; shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
        button { background: #27ae60; color: white; font-weight: bold; border: none; cursor: pointer; margin-top: 20px; }
        .pemenang-card { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 5px solid #27ae60; }
        #loading { text-align: center; color: orange; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h2>🏆 KEPUTUSAN ACARA</h2>
    <div id="loading">Memuat data dari Google Sheets...</div>

    <label>1. Pilih Acara:</label>
    <select id="pilihAcara" onchange="tapisAtlet()">
        <option value="">-- Sila Pilih Acara --</option>
    </select>

    <div id="bahagianPemenang" style="display:none;">
        <div class="pemenang-card">
            <label>🥇 TEMPAT PERTAMA:</label>
            <select id="pemenang1"></select>
        </div>
        <div class="pemenang-card">
            <label>🥈 TEMPAT KEDUA:</label>
            <select id="pemenang2"></select>
        </div>
        <div class="pemenang-card">
            <label>🥉 TEMPAT KETIGA:</label>
            <select id="pemenang3"></select>
        </div>
        <button onclick="simpanData()">SIMPAN KEPUTUSAN</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzCl7YHhTZrR9calkir3fKiml518a3TPOLAktvtwffM1nBam2oaRhK1IodfzyVV6nuO/exec';
    let database = [];

    window.onload = () => {
        fetch(scriptURL)
            .then(res => res.json())
            .then(result => {
                database = result.atlet; // Ambil data atlet
                document.getElementById('loading').style.display = 'none';
                
                // Ambil senarai unik acara untuk dropdown
                let acaraUnik = [...new Set(database.map(a => a.AcaraIndividu))].filter(x => x);
                let dropdown = document.getElementById('pilihAcara');
                acaraUnik.forEach(a => {
                    let opt = document.createElement('option');
                    opt.value = a; opt.text = a;
                    dropdown.add(opt);
                });
            });
    };

    function tapisAtlet() {
        let acaraSelected = document.getElementById('pilihAcara').value;
        if(!acaraSelected) return;

        let senaraiNama = database.filter(a => a.AcaraIndividu.includes(acaraSelected));
        
        ['pemenang1', 'pemenang2', 'pemenang3'].forEach(id => {
            let sel = document.getElementById(id);
            sel.innerHTML = '<option value="">-- Pilih Nama Atlet --</option>';
            senaraiNama.forEach(atlet => {
                let opt = document.createElement('option');
                opt.value = JSON.stringify(atlet);
                opt.text = `${atlet.NomborBadan} - ${atlet.NamaMurid} (${atlet.RumahSukan})`;
                sel.add(opt);
            });
        });
        document.getElementById('bahagianPemenang').style.display = 'block';
    }

    function simpanData() {
        let acara = document.getElementById('pilihAcara').value;
        let p1 = JSON.parse(document.getElementById('pemenang1').value || '{}');
        let p2 = JSON.parse(document.getElementById('pemenang2').value || '{}');
        let p3 = JSON.parse(document.getElementById('pemenang3').value || '{}');

        let dataPemenang = [
            { kedudukan: 1, noBadan: p1.NomborBadan, nama: p1.NamaMurid, rumah: p1.RumahSukan, mata: 5 },
            { kedudukan: 2, noBadan: p2.NomborBadan, nama: p2.NamaMurid, rumah: p2.RumahSukan, mata: 3 },
            { kedudukan: 3, noBadan: p3.NomborBadan, nama: p3.NamaMurid, rumah: p3.RumahSukan, mata: 1 }
        ].filter(p => p.noBadan);

        fetch(scriptURL, {
            method: 'POST',
            body: JSON.stringify({ action: 'SIMPAN_MARKAH', acara: acara, pemenang: dataPemenang })
        }).then(() => alert("Berjaya disimpan!"));
    }
</script>
</body>
</html>
