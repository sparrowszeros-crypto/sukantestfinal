<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Sukan SMK Taman Desa 2</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #34495e; }
        input[type="text"], select { width: 100%; padding: 12px; border: 1px solid #dcdde1; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .section-label { background: #3498db; color: white; padding: 8px 12px; border-radius: 4px; margin: 20px 0 10px; font-weight: bold; }
        .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .checkbox-item { background: #f9f9f9; padding: 10px; border-radius: 6px; border: 1px solid #eee; display: flex; align-items: center; cursor: pointer; }
        .checkbox-item input { margin-right: 10px; transform: scale(1.2); }
        .btn-save { width: 100%; background: #27ae60; color: white; padding: 15px; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-save:hover { background: #219150; }
        .btn-save:disabled { background: #95a5a6; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="container">
    <h2>Pendaftaran Sukan SMKTD2</h2>
    <form id="sportForm">
        <div class="grid">
            <div class="form-group">
                <label>Nombor Badan:</label>
                <input type="text" id="noBadan" placeholder="Contoh: K001" required>
            </div>
            <div class="form-group">
                <label>Kelas:</label>
                <input type="text" id="kelas" placeholder="Contoh: 1 Amanah" required>
            </div>
        </div>

        <div class="form-group">
            <label>Nama Murid:</label>
            <input type="text" id="nama" placeholder="Nama Penuh" required>
        </div>

        <div class="form-group">
            <label>Rumah Sukan:</label>
            <select id="rumah" required>
                <option value="Kenyalang">Kenyalang</option>
                <option value="Merak">Merak</option>
                <option value="Helang">Helang</option>
                <option value="Jentayu">Jentayu</option>
                <option value="Belatuk">Belatuk</option>
            </select>
        </div>

        <div class="section-label">Acara Individu</div>
        <div class="checkbox-grid">
            <label class="checkbox-item"><input type="checkbox" name="ind" value="70m"> 70m</label>
            <label class="checkbox-item"><input type="checkbox" name="ind" value="100m"> 100m</label>
            <label class="checkbox-item"><input type="checkbox" name="ind" value="400m"> 400m</label>
        </div>

        <div class="section-label">Acara Berpasukan</div>
        <div class="checkbox-grid">
            <label class="checkbox-item"><input type="checkbox" name="pas" value="4x100m"> 4x100m</label>
            <label class="checkbox-item"><input type="checkbox" name="pas" value="4x400m"> 4x400m</label>
            <label class="checkbox-item"><input type="checkbox" name="pas" value="Tarik Tali"> Tarik Tali</label>
        </div>

        <button type="submit" class="btn-save" id="btnSimpan">SIMPAN DATA</button>
        <button type="button" class="btn-save" style="background: #2980b9;" onclick="window.print()">CETAK</button>
    </form>
</div>

<script>
    // GANTIKAN URL DI BAWAH
    const scriptURL = https://script.google.com/macros/s/AKfycby15v98gaV2f3w0HqUgYox0U4ajUZC9Hpi6d4ayWP5c5QCdtbAYtS2HQDTusQ_-2Jz5/exec;

    const form = document.getElementById('sportForm');
    const btn = document.getElementById('btnSimpan');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = 'Menghantar...';

        const data = {
            noBadan: document.getElementById('noBadan').value,
            nama: document.getElementById('nama').value,
            rumah: document.getElementById('rumah').value,
            kelas: document.getElementById('kelas').value,
            individu: Array.from(document.querySelectorAll('input[name="ind"]:checked')).map(el => el.value),
            berpasukan: Array.from(document.querySelectorAll('input[name="pas"]:checked')).map(el => el.value)
        };

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors', // Penting untuk atasi ralat tadi
            cache: 'no-cache',
            body: JSON.stringify(data)
        })
        .then(() => {
            alert('Selesai! Data ' + data.nama + ' telah diproses. Sila semak Google Sheet.');
            btn.disabled = false;
            btn.innerText = 'SIMPAN DATA';
            form.reset();
        })
        .catch(error => {
            alert('Ralat teknikal berlaku. Semak URL Apps Script.');
            btn.disabled = false;
            btn.innerText = 'SIMPAN DATA';
        });
    });
</script>

</body>
</html>
