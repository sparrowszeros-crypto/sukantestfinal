<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Sukan SMK Taman Desa 2</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 650px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .section-header { background: #e8f0fe; padding: 10px; font-weight: bold; margin-top: 20px; border-radius: 5px; }
        .checkbox-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .check-item { background: #fafafa; border: 1px solid #eee; padding: 10px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; }
        .check-item input { margin-right: 10px; transform: scale(1.2); }
        .btn-group { display: flex; gap: 10px; margin-top: 25px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-save { background: #28a745; color: white; }
        .btn-save:hover { background: #218838; }
        .btn-print { background: #007bff; color: white; }
        .btn-print:hover { background: #0069d9; }
        @media print { .no-print { display: none; } .container { box-shadow: none; max-width: 100%; } }
    </style>
</head>
<body>

<div class="container">
    <h2>Pendaftaran Sukan Tahunan</h2>
    
    <form id="sportForm">
        <div class="input-group">
            <label>Nombor Badan Murid:</label>
            <input type="text" id="noBadan" placeholder="Contoh: K001" required>
        </div>

        <div class="input-group">
            <label>Nama Murid:</label>
            <input type="text" id="nama" placeholder="Nama penuh murid" required>
        </div>

        <div style="display: flex; gap: 15px;">
            <div class="input-group" style="flex: 1;">
                <label>Rumah Sukan:</label>
                <select id="rumah" required>
                    <option value="Kenyalang">Kenyalang</option>
                    <option value="Merak">Merak</option>
                    <option value="Helang">Helang</option>
                    <option value="Jentayu">Jentayu</option>
                    <option value="Belatuk">Belatuk</option>
                </select>
            </div>
            <div class="input-group" style="flex: 1;">
                <label>Kelas:</label>
                <input type="text" id="kelas" placeholder="Contoh: 1 Amanah" required>
            </div>
        </div>

        <div class="section-header">Acara Individu (Sila Tick)</div>
        <div class="checkbox-container">
            <label class="check-item"><input type="checkbox" name="ind" value="70m"> 70m</label>
            <label class="check-item"><input type="checkbox" name="ind" value="100m"> 100m</label>
            <label class="check-item"><input type="checkbox" name="ind" value="400m"> 400m</label>
        </div>

        <div class="section-header">Acara Berpasukan (Sila Tick)</div>
        <div class="checkbox-container">
            <label class="check-item"><input type="checkbox" name="pasukan" value="4x100m"> 4x100m</label>
            <label class="checkbox-item check-item"><input type="checkbox" name="pasukan" value="4x400m"> 4x400m</label>
            <label class="checkbox-item check-item"><input type="checkbox" name="pasukan" value="Tarik Tali"> Tarik Tali (10 org)</label>
        </div>

        <div class="btn-group no-print">
            <button type="submit" class="btn-save" id="saveBtn">SIMPAN KE GOOGLE SHEET</button>
            <button type="button" class="btn-print" onclick="window.print()">CETAK BORANG</button>
        </div>
    </form>
</div>

<script>
    // GANTIKAN URL DI BAWAH DENGAN URL WEB APP CIKGU
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyX-dIRNolDVm5c-S05Nd7uztHVT3f1THkBrfBpu6pDUiUNXJDHd_3zVjhMwvl6HFhq/exec'; 

    const form = document.getElementById('sportForm');
    const saveBtn = document.getElementById('saveBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        saveBtn.disabled = true;
        saveBtn.innerText = 'Sedang Menyimpan...';

        const data = {
            noBadan: document.getElementById('noBadan').value,
            nama: document.getElementById('nama').value,
            rumah: document.getElementById('rumah').value,
            kelas: document.getElementById('kelas').value,
            individu: Array.from(document.querySelectorAll('input[name="ind"]:checked')).map(el => el.value),
            berpasukan: Array.from(document.querySelectorAll('input[name="pasukan"]:checked')).map(el => el.value)
        };

        fetch(scriptURL, {
            method: 'POST',
            body: JSON.stringify(data)
        })
        .then(response => {
            alert('Berjaya! Maklumat ' + data.nama + ' telah disimpan/dikemaskini.');
            saveBtn.disabled = false;
            saveBtn.innerText = 'SIMPAN KE GOOGLE SHEET';
            form.reset();
        })
        .catch(error => {
            alert('Ralat! Sila pastikan URL Apps Script betul.');
            saveBtn.disabled = false;
            saveBtn.innerText = 'SIMPAN KE GOOGLE SHEET';
        });
    });
</script>

</body>
</html>
